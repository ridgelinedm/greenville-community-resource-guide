# Builds the Astro site and deploys it to GitHub Pages on every push to main.
# To enable: in your repo, go to Settings → Pages → Build and deployment →
# Source: "GitHub Actions". That's it — this workflow does the rest.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        # If you deploy to a PROJECT page (username.github.io/REPO-NAME),
        # uncomment and set the path below, and set `base` in astro.config.mjs:
        # with:
        #   path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
